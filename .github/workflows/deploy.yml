name: Production Multi-Tier Cloud Platform Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Ship Platform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Codebase
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Terraform Core
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Guardrail Validations
        run: |
          cd terraform/environments/dev
          terraform init
          terraform validate

      - name: Extract Deployment Target URLs
        id: tf_outputs
        run: |
          set -euo pipefail
          cd terraform/environments/dev

          ALB_URL=$(terraform output -raw backend_api_gateway_url)
          if [ -z "$ALB_URL" ]; then
            echo "::error::terraform output 'backend_api_gateway_url' is empty"
            exit 1
          fi

          RAW_URL=$(terraform output -raw live_web_ui_url)
          if [ -z "$RAW_URL" ]; then
            echo "::error::terraform output 'live_web_ui_url' is empty"
            exit 1
          fi
          S3_BUCKET=$(echo "$RAW_URL" | sed 's|https\?://||' | cut -d'.' -f1)

          echo "ALB_URL=$ALB_URL" >> "$GITHUB_OUTPUT"
          echo "S3_BUCKET=$S3_BUCKET" >> "$GITHUB_OUTPUT"

      # Combined Microservices Build Phase
      - name: Build & Publish Microservices
        run: |
          cd services/transaction-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/transaction-service:v1 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/transaction-service:v1
          
          cd ../fraud-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/fraud-service:v1 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/fraud-service:v1
          
          cd ../wallet-service
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wallet-service:v1 .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wallet-service:v1

      # Upgraded Frontend Compiler with Robust Self-Diagnostics
      - name: Compile Web Dashboard UI
        env:
          REACT_APP_API_URL: ${{ steps.tf_outputs.outputs.ALB_URL }}
        working-directory: frontend/react-app
        run: |
          echo "Current deployment workspace: $(pwd)"
          if [ ! -f package.json ]; then
            echo "::error::package.json was not found inside frontend/react-app!"
            exit 1
          fi
          npm install
          npm run build

      - name: Sync UI Assets to AWS S3 Static Bucket
        run: |
          aws s3 sync frontend/react-app/build/ "s3://${{ steps.tf_outputs.outputs.S3_BUCKET }}" --delete